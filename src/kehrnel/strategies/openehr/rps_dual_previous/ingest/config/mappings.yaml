rules:
  - description: "Copy context start time for any composition"
    template_ids: all
    conditions:
      path_chain:
        - "data/context/start_time/value"
    copy:
      - "data/archetype_node_id"
      - "data/context/start_time/value"
      - "p"

  - description: "Admin salut defining code"
    template_ids:
      - "openEHR-EHR-COMPOSITION.vaccination_list.v0"
    conditions:
      path_chain:
        - "at0014"
        - "at0007"
        - "openEHR-EHR-CLUSTER.admin_salut.v0"
      contains:
        - "openEHR-EHR-COMPOSITION.vaccination_list.v0"
    copy:
      - "data/archetype_node_id"
      - "data/value/defining_code/code_string"
      - "p"

  - description: "Medication action timestamp and performer"
    template_ids:
      - "openEHR-EHR-COMPOSITION.vaccination_list.v0"
    conditions:
      path_chain:
        - "openEHR-EHR-ACTION.medication.v1"
      contains:
        - "openEHR-EHR-SECTION.immunisation_list.v0"
        - "openEHR-EHR-COMPOSITION.vaccination_list.v0"
    copy:
      - "data.archetype_node_id"
      - "data/time/value"
      - "data/other_participations/performer/identifiers/id"
      - "p"

  - description: "Report-result composition metadata"
    template_ids:
      - "openEHR-EHR-COMPOSITION.report-result.v1"
    conditions:
      path_chain:
        - "openEHR-EHR-COMPOSITION.report-result.v1"
    copy:
      - "data.archetype_node_id"
      - "data/context/st/value"
      - "p"

  - description: "Lab report admin_salut value"
    template_ids:
      - "openEHR-EHR-COMPOSITION.report-result.v1"
    conditions:
      path_chain:
        - "at0001"
        - "openEHR-EHR-CLUSTER.admin_salut.v0"
    copy:
      - "data.archetype_node_id"
      - "data/value/value"
      - "p"

  - description: "Lab report admin_salut defining code"
    template_ids:
      - "openEHR-EHR-COMPOSITION.report-result.v1"
    conditions:
      path_chain:
        - "at0011"
        - "at0005"
        - "openEHR-EHR-CLUSTER.admin_salut.v0"
    copy:
      - "data.archetype_node_id"
      - "data/value/defining_code/code_string"
      - "p"

  - description: "Laboratory test analyte code"
    template_ids:
      - "openEHR-EHR-COMPOSITION.report-result.v1"
    conditions:
      path_chain:
        - "at0024"
        - "openEHR-EHR-CLUSTER.laboratory_test_analyte.v1"
        - "at0003"
        - "at0002"
        - "at0001"
        - "openEHR-EHR-OBSERVATION.laboratory_test_result.v1"
    copy:
      - "data.archetype_node_id"
      - "data/value/defining_code/code_string"
      - "p"

  - description: "Laboratory test analyte value"
    template_ids:
      - "openEHR-EHR-COMPOSITION.report-result.v1"
    conditions:
      path_chain:
        - "at0001"
        - "openEHR-EHR-CLUSTER.laboratory_test_analyte.v1"
        - "at0003"
        - "at0002"
        - "at0001"
        - "openEHR-EHR-OBSERVATION.laboratory_test_result.v1"
    copy:
      - "data.archetype_node_id"
      - "data/value/value"
      - "p"

  - description: "Height magnitude and units"
    template_ids:
      - "openEHR-EHR-COMPOSITION.encounter.v1"
    conditions:
      path_chain:
        - "at0004"
        - "at0003"
        - "at0002"
        - "at0001"
        - "openEHR-EHR-OBSERVATION.height.v2"
    copy:
      - "data/archetype_node_id"
      - "data/value/magnitude"
      - "data/value/units"
      - "p"

  - description: "Height observation timestamp"
    template_ids:
      - "openEHR-EHR-COMPOSITION.encounter.v1"
    conditions:
      path_chain:
        - "at0002"
        - "at0001"
        - "openEHR-EHR-OBSERVATION.height.v2"
    copy:
      - "data/time/value"
      - "p"

  - description: "Self-reported performer identifier"
    template_ids:
      - "openEHR-EHR-COMPOSITION.self_reported_data.v0"
    conditions:
      path_chain:
        - "openEHR-EHR-COMPOSITION.self_reported_data.v0"
    copy:
      - "data/archetype_node_id"
      - "data/context/participations/performer/identifiers/id"
      - "p"