[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kehrnel-core"
version = "0.1.0"
description = "kehrnel core, mapper and CLI"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Your Name", email = "you@example.com" }]

# Hard runtime deps
dependencies = [
    "PyYAML>=6",
    "tabulate>=0.9",
    "lxml>=4.9",
    "Jinja2>=3.1",
    "pydantic>=2.5",
    "jsonschema>=4.22",
    "python-dateutil>=2.8.2",
    "cryptography>=42.0.0"
]

[project.optional-dependencies]
# CLI tooling
cli = [
    "typer[all]>=0.9",
    "json5>=0.9",
    "Jinja2>=3.1"
]

# Translation (OpenAI SDK v1+)
translate = [
    "openai>=1.0.0",
    "python-dotenv>=1.0.0"
]

# Optional persistence
mongo = ["pymongo>=4"]

# Optional API stack
api = [
    "fastapi>=0.104",
    "uvicorn[standard]>=0.24",
    "motor>=3.3",
    "certifi>=2024.0.0",
    "python-multipart>=0.0.6",
<<<<<<< HEAD
    "pydantic-settings>=2.0.0",
    "pydantic>=2.5"
=======
    "pydantic>=2.5",
    "pydantic-settings>=2.2",
    "python-dateutil>=2.8"
>>>>>>> staging
]

# Tests/dev tooling
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0"
]

# Kitchen-sink install
all = [
    "typer[all]>=0.9",
    "json5>=0.9",
    "Jinja2>=3.1",
    "openai>=1.0.0",
    "python-dotenv>=1.0.0",
    "pymongo>=4",
    "fastapi>=0.104",
    "uvicorn[standard]>=0.24",
    "motor>=3.3",
    "certifi>=2024.0.0",
    "python-multipart>=0.0.6",
    "pydantic-settings>=2.0.0",
    "pydantic>=2.5",
    "python-dateutil>=2.8.2",
    "cryptography>=42.0.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0"
]

[project.scripts]
kehrnel = "kehrnel.cli.unified:main"
kehrnel-api      = "kehrnel.api.app:main"

# ---------------------------------------------------------------------------
# Use src/ layout and auto-discover ALL subpackages
# ---------------------------------------------------------------------------
[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["kehrnel*"]

# ---------------------------------------------------------------------------
# Package data
# ---------------------------------------------------------------------------
[tool.setuptools.package-data]
"*" = ["*.yaml", "*.yml", "*.json"]
"kehrnel.engine.common.mapping" = ["patterns.yaml"]

# ---------------------------------------------------------------------------
# Optional: uvicorn dev settings
# ---------------------------------------------------------------------------
[tool.uvicorn]
host = "0.0.0.0"
port = 8000
reload = true
log-level = "info"
