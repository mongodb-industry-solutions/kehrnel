# tumour_mapping.yaml# ════════════════════════════════════════════════════════════════════════
# ════════════════════════════════════════════════════════════════════════
#  FICHE TUMEUR  ➜  TEMPLATE “T-IGR-TUMOUR-SUMMARY”
#  Version 1.0 – generates a strict-mode-clean Composition
# ════════════════════════════════════════════════════════════════════════

##############################################################################
# ── 0)  (optional) Meta information – ignored by generator but handy for humans
##############################################################################
_metadata:
  version        : "1.0"
  source_format  : "FicheTumeur_CDA"
  target_template: "T-IGR-TUMOUR-SUMMARY"
  namespaces:
    cda: "urn:hl7-org:v3"

##############################################################################
# ── 1) COMPOSITION HEADER (always present) ────────────────────────────────
##############################################################################
"/language/terminology_id/value" : "constant:ISO_639-1"
"/language/code_string"          : "constant:en"

"/territory/terminology_id/value": "constant:ISO_3166-1"
"/territory/code_string"         : "constant:FR"

"/category/value"                               : "constant:event"
"/category/defining_code/terminology_id/value"  : "constant:openehr"
"/category/defining_code/code_string"           : "constant:433"

"/context/setting/value"                        : "constant:home"
"/context/setting/defining_code/terminology_id/value": "constant:openehr"
"/context/setting/defining_code/code_string"    : "constant:225"

"/composer/name"                                : "xpath://cda:representedCustodianOrganization/cda:name/text()"
"/context/health_care_facility/name"            : "xpath://cda:representedCustodianOrganization/cda:name/text()"
"/composer/external_ref/id/value"        : "constant:auto"     # ❸
"/composer/external_ref/namespace"       : "constant:unknown"  # ❸
"/composer/external_ref/type"            : "constant:PERSON" 

"/context/start_time/value":
  xpath: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"
"/context/end_time/value":
  xpath: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"

"/context/health_care_facility/external_ref/id/value" : "constant:IGR"   # ❶
"/context/health_care_facility/external_ref/namespace": "constant:FR"    # ❶
"/context/health_care_facility/external_ref/type"     : "constant:ORGANISATION" 

##############################################################################
# ── 2) EVALUATION.problem_diagnosis — actual tumour data  ─────────────────
##############################################################################
# Basic facts --------------------------------------------------------------
"/content/0/items/0/data/items/0/value/value" : "xpath://cda:ficheTumeur/cda:codeLesionnel/text()"
"/content/0/items/0/data/items/1/value/value" : "xpath://cda:ficheTumeur/cda:categorie[normalize-space()]/text()"
"/content/0/items/0/data/items/2/value/value" : "xpath://cda:ficheTumeur/cda:codeGdeLocalisation/text()"

# Anatomical-location cluster ---------------------------------------------
"/content/0/items/0/data/items/3/items/0/value/value":
  "xpath://cda:ficheTumeur/cda:codeSiege/text()"

# Specific site — put “Not specified” when CDA has no value
"/content/0/items/0/data/items/3/items/1/value/value":
  xpath: "normalize-space(//cda:ficheTumeur/cda:codeSiege/text())"
  map : { "": Not specified }

"/content/0/items/0/data/items/3/items/2/value/value" : "constant:Not specified"



# Laterality (DV_CODED_TEXT) — map Left/Right, else drop ---------------
_preprocessing:
  # drop the empty Laterality stub that comes with the template
  - type: delete
    xpath: "/content//CLUSTER[@archetype_node_id='openEHR-EHR-CLUSTER.anatomical_location.v1']\
            /items/ELEMENT[@archetype_node_id='at0002']"

_"/content/0/items/0/data/items/3/items/{append}":
  when : "normalize-space(//cda:ficheTumeur/cda:cote/text()) != ''"
  template:
    _type                        : "ELEMENT"
    name/value                   : "Laterality"
    archetype_node_id            : "at0002"
    value/_type                  : "DV_CODED_TEXT"
    value/value:
      xpath: //cda:ficheTumeur/cda:cote/text()
      map : {droit: Right, gauche: Left}
    value/defining_code/terminology_id/value : "constant:local"
    value/defining_code/code_string:
      xpath: //cda:ficheTumeur/cda:cote/text()
      map : {droit: at0004, gauche: at0003}

"/content/0/items/0/data/items/3/items/2/value/defining_code/code_string": "constant:at0065"
"/content/0/items/0/data/items/3/items/2/value/defining_code/terminology_id/value": "constant:local"

# Cause --------------------------------------------------------------------
"/content/0/items/0/data/items/4/value/value" : "constant:Not specified"

# Last updated --------------------------------------------------------------------
"/content/0/items/0/protocol/items/0/value/value":
  xpath: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"

# Date/time of onset  ------------------------------------------------------
"/content/0/items/0/data/items/5/value/value":
  xpath: "concat(//cda:ficheTumeur/cda:dateDiagnostic/text(),'T00:00:00')"

# Date/time clinically recognised (already present in template index 6)
"/content/0/items/0/data/items/6/value/value":
  xpath: "concat(//cda:ficheTumeur/cda:dateDiagnostic/text(),'T00:00:00')"

# Severity (coded: Unknown) -------------------------------------------------
"/content/0/items/0/data/items/7/value/value"                          : "constant:Unknown"
"/content/0/items/0/data/items/7/value/defining_code/code_string"      : "constant:at0049"
"/content/0/items/0/data/items/7/value/defining_code/terminology_id/value": "constant:local"

# TNM clinical cluster  (index 8)  – fill with “X / false” placeholders ----
"/content/0/items/0/data/items/8/items/0/value/value":
  xpath : "string(//cda:TNM[cda:type='c']/cda:T)"
  map   : {"": "X"}

"/content/0/items/0/data/items/8/items/1/value/value":
  xpath : "string(//cda:TNM[cda:type='c']/cda:N)"
  map   : {"": "X"}

"/content/0/items/0/data/items/8/items/2/value/value":
  xpath : "string(//cda:TNM[cda:type='c']/cda:M)"
  map   : {"": "X"}



# TNM pathological cluster (index 9) – same placeholders -------------------
"/content/0/items/0/data/items/9/items/0/value/value":
  xpath: "normalize-space(//cda:TNM[cda:type='p']/cda:T)"
  map  : {"": "X"}

"/content/0/items/0/data/items/9/items/1/value/value":
  xpath: "normalize-space(//cda:TNM[cda:type='p']/cda:N)"
  map  : {"": "X"}

"/content/0/items/0/data/items/9/items/2/value/value":
  xpath: "normalize-space(//cda:TNM[cda:type='p']/cda:M)"
  map  : {"": "X"}

# Optional extra dates – add as protocol extension if present ❷
_"/content/0/items/0/protocol/items/{append}":
  when: "normalize-space(//cda:dateRecidive/text())!=''"
  template:
    _type                   : "ELEMENT"
    name/value              : "Date of local recurrence"
    value/_type             : "DV_DATE_TIME"
    value/value             : "xpath:concat(//cda:dateRecidive/text(),'T00:00:00')"

_"/content/0/items/0/protocol/items/{append}":
  when: "normalize-space(//cda:dateMetastase/text())!=''"
  template:
    _type                   : "ELEMENT"
    name/value              : "Date of metastatic recurrence"
    value/_type             : "DV_DATE_TIME"
    value/value             : "xpath:concat(//cda:dateMetastase/text(),'T00:00:00')"

    
##############################################################################
# ── 3)  Mandatory RM header fields inside the EVALUATION -------------------
##############################################################################
"/content/0/items/0/language/terminology_id/value"  : "constant:ISO_639-1"
"/content/0/items/0/language/code_string"           : "constant:en"

"/content/0/items/0/encoding/terminology_id/value"  : "constant:IANA_character-sets"
"/content/0/items/0/encoding/code_string"           : "constant:UTF-8"

"/content/0/items/0/workflow_id/namespace"          : "constant:unknown"
"/content/0/items/0/workflow_id/type"               : "constant:ANY"
"/content/0/items/0/workflow_id/id/value"           : "constant:auto"
"/content/0/items/0/workflow_id/id/scheme"          : "constant:scheme"

"/content/0/items/0/guideline_id/namespace"         : "constant:unknown"
"/content/0/items/0/guideline_id/type"              : "constant:ANY"
"/content/0/items/0/guideline_id/id/value"          : "constant:auto"
"/content/0/items/0/guideline_id/id/scheme"         : "constant:scheme"

# lesionAnterieure / lesionSimultanee → use CLUSTER.problem_qualifier slot
_"/content/0/items/0/data/items/{append}":
  when    : "count(//cda:ficheTumeur/cda:lesionAnterieure | //cda:ficheTumeur/cda:lesionSimultanee) > 0"
  template:
    _type            : "CLUSTER"
    archetype_node_id: "openEHR-EHR-CLUSTER.problem_qualifier.v2"
    name/value       : "Temporal relation"
    items:
      - _type              : "ELEMENT"
        archetype_node_id  : "at0001"
        name/value         : "Anterior lesion"
        value/_type        : "DV_BOOLEAN"
        value/value        : "xpath:boolean(//cda:lesionAnterieure[normalize-space(.)!=''])"
      - _type              : "ELEMENT"
        archetype_node_id  : "at0002"
        name/value         : "Simultaneous lesion"
        value/_type        : "DV_BOOLEAN"
        value/value        : "xpath:boolean(//cda:lesionSimultanee[normalize-space(.)!=''])"


# Universal clean-up – drop any ELEMENT whose value is empty / whitespace
_postprocessing:
  - type: delete
    xpath: "//ELEMENT[starts-with(@archetype_node_id,'at0002') and
                     value/DV_CODED_TEXT/value[not(normalize-space())]]"
  - type: delete
    xpath: "//ELEMENT[value/DV_TEXT/value[not(normalize-space())]]"