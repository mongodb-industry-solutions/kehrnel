# samples/mappings/whoqol.yaml
meta:
  target_webtemplate: whoqol_v0
  default_source: csv1
  translation:
    enabled: false

sources:
  csv1:
    type: csv
    columns: [paciente, centro, servicio, consulta, etapa, prom, fecha, pregunta, respuesta]
    date_format: "%d/%m/%Y"
    encoding: "utf-8"

input:
  from: csv1
  where:
    - 'servicio == "VIH eVIHa"'
    - 'prom ~= "(?i)whoqol"'
    - 'respuesta != "N/A"'
    - 'respuesta !~= "^\\s*$"'
  group_by: [paciente, servicio, consulta]

output:
  prune_empty: true
  filename: "whoqol_{{ first.paciente }}_{{ first.consulta }}_{{ index|int }}.json"
  composition_key: canonicalJSON

  envelope:
    ehr_id:            { get: { from: paciente }, transform: [strip] }
    composition_date:  { expr: "{{ comp.context.start_time.value }}", transform: [wrap_date] }
    archetype_node_id: { expr: "{{ comp.archetype_details.archetype_id.value }}" }
    last_processed:    { expr: "{{ now_utc_iso() }}", transform: [wrap_date] }

mappings:

  # ───────── COMPOSITION header ─────────
  "/language/code_string":               { set: "en" }
  "/territory/code_string":              { set: "ES" }
  "/category/defining_code/code_string": { set: "433" }

  "/context/start_time/value":
    get: { from: csv1, column: fecha }
    transform: [date_iso]

  # Optional setting context
  "/context/setting/defining_code/terminology_id/value": { set: "openehr" }
  "/context/setting/defining_code/code_string":          { set: "225" }
  "/context/setting/value":                              { set: "home" }

  # ───────── OBSERVATION scaffolding / timing ─────────
  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/language/code_string": { set: "en" }

  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/events[at0002]/name/value":
    set: "Any event"

  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/events[at0002]/time/value":
    get: { from: csv1, column: fecha }
    transform: [date_iso]
    overwrite: last

  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/origin/value":
    get: { from: csv1, column: fecha }
    transform: [date_iso]
    overwrite: last

  # Helper: trimmed answer used everywhere
  _answer: &trimmed_answer
    get: { from: csv1, column: respuesta }
    transform: [strip]

  # ───────── Q1–Q31 EXACT MATCHES (Spanish) ─────────
  # Q1  (Very poor … Very good)
  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/events[at0002]/data[at0003]/items[at0004]/value":
    when: 'pregunta == "¿Cómo calificarías tu calidad de vida?"'
    <<: *trimmed_answer
    map:
      "Muy mala":               at0005
      "Regular":                at0006
      "Normal":                 at0007
      "Bastante buena":         at0008
      "Muy buena":              at0009

  # Q2  (Never … Always) — CSV uses satisfaction wording; we map given the OPT’s 1..5 order.
  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/events[at0002]/data[at0003]/items[at0010]/value":
    when: 'pregunta == "¿Cómo de satisfecho/a estás con tu salud?"'
    <<: *trimmed_answer
    map:
      "Nada":       at0263   # Never
      "Poco":       at0264   # Seldom
      "Algo":       at0265   # Quite often
      "Bastante":   at0266   # Very often
      "Mucho":      at0267   # Always

  # Q3  (Not at all … An extreme amount)
  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/events[at0002]/data[at0003]/items[at0016]/value":
    when: 'pregunta == "¿Hasta qué punto piensas que el dolor (físico) te impide hacer lo que necesitas?"'
    <<: *trimmed_answer
    map: { "Nada": at0017, "Poco": at0018, "Algo": at0019, "Bastante": at0020, "Mucho": at0021 }

  # Q4
