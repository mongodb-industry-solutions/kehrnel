    when: 'pregunta == "¿En qué grado te molestan los problemas físicos relacionados con tu infección por VIH?"'
    <<: *trimmed_answer
    map: { "Nada": at0023, "Poco": at0024, "Algo": at0025, "Bastante": at0026, "Mucho": at0027 }

  # Q5
  "/content[openEHR-EHR-OBSERVATION.whoqol.v0]/data[at0001]/events[at0002]/data[at0003]/items[at0028]/value":
    when: 'pregunta == "¿En qué grado necesitas de un tratamiento médico para funcionar en tu vida diaria?"'
