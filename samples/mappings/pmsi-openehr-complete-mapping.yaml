    oui: true
    non: false

"/content/{i}/data/items/0/items/0/items/13/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/0/items/13/name/value":        "constant: Anonymised?"
"/content/{i}/data/items/0/items/0/items/13/archetype_node_id": "constant: at0016"
"/content/{i}/data/items/0/items/0/items/13/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/0/items/13/value/value":
  xpath: //cda:evenementPMSI[{i}]/cda:venue/@anonyme
  aggregate: first
  map:
    oui: true
    non: false

"/content/{i}/data/items/0/items/0/items/14/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/0/items/14/name/value":        "constant: Confidential?"
"/content/{i}/data/items/0/items/0/items/14/archetype_node_id": "constant: at0017"
"/content/{i}/data/items/0/items/0/items/14/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/0/items/14/value/value":
  xpath: //cda:evenementPMSI[{i}]/cda:venue/@confidentiel
  aggregate: first
  map:
    oui: true
    non: false

"/content/{i}/data/items/0/items/0/items/15/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/0/items/15/name/value":        "constant: Billable?"
"/content/{i}/data/items/0/items/0/items/15/archetype_node_id": "constant: at0018"
"/content/{i}/data/items/0/items/0/items/15/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/0/items/15/value/value":
  xpath: //cda:evenementPMSI[{i}]/cda:venue/@facturable
  aggregate: first
  map:
    oui: true
    non: false

"/content/{i}/data/items/0/items/0/items/16/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/0/items/16/name/value":        "constant: Private stay?"
"/content/{i}/data/items/0/items/0/items/16/archetype_node_id": "constant: at0019"
"/content/{i}/data/items/0/items/0/items/16/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/0/items/16/value/value":
  xpath: //cda:evenementPMSI[{i}]/cda:venue/@prive
  aggregate: first
