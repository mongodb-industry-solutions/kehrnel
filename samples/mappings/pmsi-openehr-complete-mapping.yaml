    non: false

##############################################################################
# DIAGNOSTIC LIST CLUSTER
##############################################################################
"/content/{i}/data/items/0/items/1/_type":             "constant: CLUSTER"
"/content/{i}/data/items/0/items/1/name/value":        "constant: Diagnostic List"
"/content/{i}/data/items/0/items/1/archetype_node_id": "constant: at0002"

# principal diagnosis
"/content/{i}/data/items/0/items/1/items/0/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/1/items/0/name/value":        "constant: Diagnosis Role"
"/content/{i}/data/items/0/items/1/items/0/archetype_node_id": "constant: at0040"
"/content/{i}/data/items/0/items/1/items/0/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/1/items/0/value/value":       "constant: Principal"
"/content/{i}/data/items/0/items/1/items/0/value/defining_code/code_string": "constant: at0042"
"/content/{i}/data/items/0/items/1/items/0/value/defining_code/terminology_id/value": "constant: local"

"/content/{i}/data/items/0/items/1/items/1/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/1/items/1/name/value":        "constant: CIM-10 Code"
"/content/{i}/data/items/0/items/1/items/1/archetype_node_id": "constant: at0041"
"/content/{i}/data/items/0/items/1/items/1/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/1/items/1/value/value":
  xpath: //cda:evenementPMSI[{i}]//cda:diagnosticPrincipal/cda:codeCim10/text()
  aggregate: first 
"/content/{i}/data/items/0/items/1/items/1/value/defining_code/code_string":
  xpath: //cda:evenementPMSI[{i}]//cda:diagnosticPrincipal/cda:codeCim10/text()
  aggregate: first
"/content/{i}/data/items/0/items/1/items/1/value/defining_code/terminology_id/value": "constant: http://fhir.igr.fr/CodeSystem/CIM-10-FR"

# related diagnosis
"/content/{i}/data/items/0/items/1/items/2/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/1/items/2/name/value":        "constant: Diagnosis Role"
"/content/{i}/data/items/0/items/1/items/2/archetype_node_id": "constant: at0040"
"/content/{i}/data/items/0/items/1/items/2/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/1/items/2/value/value":       "constant: Related"
"/content/{i}/data/items/0/items/1/items/2/value/defining_code/code_string": "constant: at0043"
"/content/{i}/data/items/0/items/1/items/2/value/defining_code/terminology_id/value": "constant: local"

"/content/{i}/data/items/0/items/1/items/3/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/1/items/3/name/value":        "constant: CIM-10 Code"
"/content/{i}/data/items/0/items/1/items/3/archetype_node_id": "constant: at0041"
"/content/{i}/data/items/0/items/1/items/3/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/1/items/3/value/value":
  xpath: //cda:evenementPMSI[{i}]//cda:diagnosticRelie/cda:codeCim10/text()
  aggregate: first
"/content/{i}/data/items/0/items/1/items/3/value/defining_code/code_string":
  xpath: //cda:evenementPMSI[{i}]//cda:diagnosticRelie/cda:codeCim10/text()
  aggregate: first
"/content/{i}/data/items/0/items/1/items/3/value/defining_code/terminology_id/value": "constant: http://fhir.igr.fr/CodeSystem/CIM-10-FR"

# first significant diagnosis
"/content/{i}/data/items/0/items/1/items/4/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/1/items/4/name/value":        "constant: Diagnosis Role"
"/content/{i}/data/items/0/items/1/items/4/archetype_node_id": "constant: at0040"
"/content/{i}/data/items/0/items/1/items/4/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/1/items/4/value/value":       "constant: Significant"
"/content/{i}/data/items/0/items/1/items/4/value/defining_code/code_string": "constant: at0044"
"/content/{i}/data/items/0/items/1/items/4/value/defining_code/terminology_id/value": "constant: local"

"/content/{i}/data/items/0/items/1/items/5/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/1/items/5/name/value":        "constant: CIM-10 Code"
"/content/{i}/data/items/0/items/1/items/5/archetype_node_id": "constant: at0041"
"/content/{i}/data/items/0/items/1/items/5/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/1/items/5/value/value":
  xpath: //cda:evenementPMSI[{i}]//cda:diagnosticsSignificatifs[1]/cda:diagnosticSignificatif/cda:codeCim10/text()
  aggregate: first
"/content/{i}/data/items/0/items/1/items/5/value/defining_code/code_string":
  xpath: //cda:evenementPMSI[{i}]//cda:diagnosticsSignificatifs[1]/cda:diagnosticSignificatif/cda:codeCim10/text()
  aggregate: first
"/content/{i}/data/items/0/items/1/items/5/value/defining_code/terminology_id/value": "constant: http://fhir.igr.fr/CodeSystem/CIM-10-FR"

##############################################################################
