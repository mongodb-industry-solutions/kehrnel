"/content/{i}/data/items/0/items/2/items/0/value/defining_code/terminology_id/value": "constant: local"

"/content/{i}/data/items/0/items/2/items/1/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/2/items/1/name/value":        "constant: Phase"
"/content/{i}/data/items/0/items/2/items/1/archetype_node_id": "constant: at0046"
"/content/{i}/data/items/0/items/2/items/1/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/2/items/1/value/value":
  xpath: string((//cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:codePhase/text())[1])
  aggregate: first

"/content/{i}/data/items/0/items/2/items/1/value/defining_code/code_string":
  xpath: string((//cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:codePhase/text())[1])
  aggregate: first
"/content/{i}/data/items/0/items/2/items/1/value/defining_code/terminology_id/value": "constant: local"

"/content/{i}/data/items/0/items/2/items/2/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/2/items/2/name/value":        "constant: Activity"
"/content/{i}/data/items/0/items/2/items/2/archetype_node_id": "constant: at0047"
"/content/{i}/data/items/0/items/2/items/2/value/_type":       "constant: DV_CODED_TEXT"
"/content/{i}/data/items/0/items/2/items/2/value/value":
  xpath: string((//cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:codeActivite/text())[1])
"/content/{i}/data/items/0/items/2/items/2/value/defining_code/code_string":
  xpath: string((//cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:codeActivite/text())[1])
"/content/{i}/data/items/0/items/2/items/2/value/defining_code/terminology_id/value": "constant: local"

"/content/{i}/data/items/0/items/2/items/3/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/2/items/3/name/value":        "constant: Quantity"
"/content/{i}/data/items/0/items/2/items/3/archetype_node_id": "constant: at0048"
"/content/{i}/data/items/0/items/2/items/3/value/_type":       "constant: DV_COUNT"
"/content/{i}/data/items/0/items/2/items/3/value/magnitude":
  xpath:     "number(//cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:quantite/text())"
  transform: "to_int"
  cast: "INTEGER" 

"/content/{i}/data/items/0/items/2/items/4/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/2/items/4/name/value":        "constant: Date/Time Performed"
"/content/{i}/data/items/0/items/2/items/4/archetype_node_id": "constant: at0049"
"/content/{i}/data/items/0/items/2/items/4/value/_type":       "constant: DV_INTERVAL"
"/content/{i}/data/items/0/items/2/items/4/value/lower_unbounded": "constant: false"
"/content/{i}/data/items/0/items/2/items/4/value/upper_unbounded": "constant: false"
"/content/{i}/data/items/0/items/2/items/4/value/lower_included":  "constant: false"
"/content/{i}/data/items/0/items/2/items/4/value/upper_included":  "constant: false"
"/content/{i}/data/items/0/items/2/items/4/value/lower/_type":     "constant: DV_DATE_TIME"
"/content/{i}/data/items/0/items/2/items/4/value/lower/value":
  xpath:     //cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:dateRealisation/text()
  transform: space_to_T
"/content/{i}/data/items/0/items/2/items/4/value/upper/_type":     "constant: DV_DATE_TIME"
"/content/{i}/data/items/0/items/2/items/4/value/upper/value":
  xpath:     //cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/cda:dateRealisation/text()
  transform: space_to_T

"/content/{i}/data/items/0/items/2/items/5/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/2/items/5/name/value":        "constant: External Act?"
"/content/{i}/data/items/0/items/2/items/5/archetype_node_id": "constant: at0050"
"/content/{i}/data/items/0/items/2/items/5/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/2/items/5/value/value":
  xpath: //cda:evenementPMSI[{i}]//cda:acte[1]/@externe
  aggregate: first
  map:
    oui: true
    non: false

"/content/{i}/data/items/0/items/2/items/6/_type":             "constant: ELEMENT"
"/content/{i}/data/items/0/items/2/items/6/name/value":        "constant: Exceptional Reimbursement?"
"/content/{i}/data/items/0/items/2/items/6/archetype_node_id": "constant: at0051"
"/content/{i}/data/items/0/items/2/items/6/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/2/items/6/value/value":
  xpath: //cda:evenementPMSI[{i}]//cda:acte[1]/cda:CCAM/@remboursementExceptionnel
  aggregate: first
  map:
    oui: true
    non: false


##############################################################################
#  PER-CONTENT DEFAULTS  (applies to every /content/{i} …)
##############################################################################
"/content/{i}/language/terminology_id/value":      "constant: ISO_639-1"
"/content/{i}/encoding/terminology_id/value":      "constant: IANA_character-sets"

"/content/{i}/workflow_id/namespace":              "constant: openEHR-Mapper"
"/content/{i}/workflow_id/type":                   "constant: ANY"
"/content/{i}/workflow_id/id/value":               "constant: auto"
"/content/{i}/workflow_id/id/scheme":              "constant: scheme"

##############################################################################
# TRANSFORM FUNCTIONS
##############################################################################
_transforms:
  hl7_to_iso8601:
    type:       regex
    pattern:    "^(\\d{4})(\\d{2})(\\d{2})(\\d{2})(\\d{2})(\\d{2})([\\+\\-]\\d{4})$"
    replacement: "$1-$2-$3T$4:$5:$6$7"

  space_to_T:
    type:   replace
    search: " "
    replace: "T"
