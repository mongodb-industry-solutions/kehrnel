"/content/{i}/data/items/0/items/0/items/12/archetype_node_id": "constant: at0015"
"/content/{i}/data/items/0/items/0/items/12/value/_type":       "constant: DV_BOOLEAN"
"/content/{i}/data/items/0/items/0/items/12/value/value":
  xpath: //cda:evenementPMSI[{i}]/cda:rss/cda:rum/@prestationInterEtablissementA
  aggregate: first
