# tumour_mapping.yaml ─────────────────────────────────────────────────────────
#  FICHE TUMEUR  →  TEMPLATE “T-IGR-TUMOUR-SUMMARY”
#  Version 1.1 – macro/Jinja edition – strict-mode clean
# ─────────────────────────────────────────────────────────────────────────────

##############################################################################
# 0) Meta-data  (ignored by mapper, useful for humans and tooling)
##############################################################################
_metadata:
  version        : "1.1"
  source_format  : "FicheTumeur_CDA"
  target_template: "T-IGR-TUMOUR-SUMMARY"
  namespaces: { cda: "urn:hl7-org:v3" }

##############################################################################
# 1) Global options
##############################################################################
_options:
  prune_empty: true

##############################################################################
# 2) COMPOSITION context  (macros replace dozens of /value/... leaves)
##############################################################################
language:
  code  : en
  system: ISO_639-1

territory:
  code  : FR
  system: ISO_3166-1

category:
  code   : 433
  term   : event
  system : openehr

context/setting:
  code   : 225
  term   : home
  system : openehr

# Facility / author names ----------------------------------------------------
composer/name:
  xpath: //cda:representedCustodianOrganization/cda:name/text()

context/health_care_facility/name:
  xpath: //cda:representedCustodianOrganization/cda:name/text()

# Document time (null-flavour when missing) ----------------------------------
context/start_time:
  template: "{{ xpath('//cda:ficheTumeur/cda:dateCreation/text()') ~ 'T00:00:00' }}"
  null_flavour: unknown

context/end_time:
  template: "{{ xpath('//cda:ficheTumeur/cda:dateCreation/text()') ~ 'T00:00:00' }}"

##############################################################################
# 3) EVALUATION.problem_diagnosis  (basic facts)
##############################################################################
# — ICD lesion code / category / topography ———————————
content/0/items/0/data/items/0/value/value:
  xpath: //cda:ficheTumeur/cda:codeLesionnel/text()

content/0/items/0/data/items/1/value/value:
  xpath: //cda:ficheTumeur/cda:categorie[normalize-space()]/text()

content/0/items/0/data/items/2/value/value:
  xpath: //cda:ficheTumeur/cda:codeGdeLocalisation/text()

# — Anatomical-location cluster —————————————————————————
content/0/items/0/data/items/3/items/0/value/value:
  xpath: //cda:ficheTumeur/cda:codeSiege/text()

# specific site – default “Not specified” when empty
content/0/items/0/data/items/3/items/1:
  term:
    xpath: normalize-space(//cda:ficheTumeur/cda:codeSiege/text())
  default: Not specified

# Laterality – coded-text macro (adds three leaves)
content/0/items/0/data/items/3/items/Laterality:
  code:
    xpath: //cda:ficheTumeur/cda:cote/text()
    map: { droit: at0004, gauche: at0003 }
  term:
    xpath: //cda:ficheTumeur/cda:cote/text()
    map: { droit: Right, gauche: Left }
  system: local
  when: "normalize-space(//cda:ficheTumeur/cda:cote/text()) != ''"

##############################################################################
# 4) Pre-processing 
##############################################################################
_preprocessing:
  - type: delete
    xpath: "/content//CLUSTER[@archetype_node_id='openEHR-EHR-CLUSTER.anatomical_location.v1']\
            /items/ELEMENT[@archetype_node_id='at0002']"

##############################################################################
# 5) Dynamic inserts – Laterality stub deletion + append blocks
##############################################################################
_"/content/0/items/0/data/items/3/items/{append}":
  when : "normalize-space(//cda:ficheTumeur/cda:cote/text()) != ''"
  template:
    _type       : ELEMENT
    name/value  : Laterality
    archetype_node_id: at0002
    value/_type : DV_CODED_TEXT
    value/value:
      xpath: //cda:ficheTumeur/cda:cote/text()
      map : { droit: Right, gauche: Left }
    value/defining_code:
      terminology_id/value: local
      code_string:
        xpath: //cda:ficheTumeur/cda:cote/text()
        map : { droit: at0004, gauche: at0003 }

##############################################################################
# 6) Fixed constants and simple XPath 
##############################################################################
content/0/items/0/data/items/4/value/value: "constant: Not specified"

content/0/items/0/protocol/items/0/value/value:
  xpath: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"

content/0/items/0/data/items/5/value/value:
  xpath: "concat(//cda:ficheTumeur/cda:dateDiagnostic/text(),'T00:00:00')"

content/0/items/0/data/items/6/value/value:
  xpath: "concat(//cda:ficheTumeur/cda:dateDiagnostic/text(),'T00:00:00')"

# Severity element stays verbatim 
_"/content/0/items/0/data/items/{append}":
  when: "normalize-space(//cda:ficheTumeur/cda:severity/text()) != ''"
  template:
    _type            : ELEMENT
    name/value       : Severity
    archetype_node_id: at0005
    value/_type      : DV_CODED_TEXT
    value/value:
      xpath: //cda:ficheTumeur/cda:severity/text()
      map : { at0047: Mild, at0048: Moderate, at0049: Unknown }
    value/defining_code:
      terminology_id/value: local
      code_string:
        xpath: //cda:ficheTumeur/cda:severity/text()

# TNM / Dates / Problem-qualifier clusters 

##############################################################################
# 7) Mandatory RM header fields inside the EVALUATION 
##############################################################################
"/content/0/items/0/language/terminology_id/value": "constant: ISO_639-1"
"/content/0/items/0/language/code_string":           "constant: en"

"/content/0/items/0/encoding/terminology_id/value":  "constant: IANA_character-sets"
"/content/0/items/0/encoding/code_string":           "constant: UTF-8"

"/content/0/items/0/workflow_id/namespace":          "constant: unknown"
"/content/0/items/0/workflow_id/type":               "constant: ANY"
"/content/0/items/0/workflow_id/id/value":           "constant: auto"
"/content/0/items/0/workflow_id/id/scheme":          "constant: scheme"

"/content/0/items/0/guideline_id/namespace":         "constant: unknown"
"/content/0/items/0/guideline_id/type":              "constant: ANY"
"/content/0/items/0/guideline_id/id/value":          "constant: auto"
"/content/0/items/0/guideline_id/id/scheme":         "constant: scheme"

_"/content/0/items/0/data/items/{append}":
  when: "count(//cda:ficheTumeur/cda:lesionAnterieure | //cda:ficheTumeur/cda:lesionSimultanee) > 0"
  template:
    _type            : CLUSTER
    archetype_node_id: openEHR-EHR-CLUSTER.problem_qualifier.v2
    name/value       : Temporal relation
    items:
      - _type : ELEMENT
        archetype_node_id: at0001
        name/value : Anterior lesion
        value/_type : DV_BOOLEAN
        value/value:
          xpath: boolean(//cda:lesionAnterieure[normalize-space(.)!=''])
      - _type : ELEMENT
        archetype_node_id: at0002
        name/value : Simultaneous lesion
        value/_type : DV_BOOLEAN
        value/value:
          xpath: boolean(//cda:lesionSimultanee[normalize-space(.)!=''])