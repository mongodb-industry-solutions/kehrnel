meta:
  default_source: cda1

sources:
  cda1:
    type: xml
    namespaces:
      cda: "urn:hl7-org:v3"

input:
  from: cda1

output:
  prune_empty: true
  filename: "tumour_output.json"
  envelope:
    record_id:
      get:
        selector: "normalize-space(//cda:ficheTumeur/@id)"

mappings:
  "/territory/code_string":
    set: "FR"

  "/composer/name":
    get:
      selector: "//cda:representedCustodianOrganization/cda:name/text()"

  "/context/health_care_facility/name":
    get:
      selector: "//cda:representedCustodianOrganization/cda:name/text()"

  "/context/start_time/value":
    get:
      selector: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"

  "/context/end_time/value":
    get:
      selector: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"

  "/content[0]/items[0]/data/items[0]/value/value":
    get:
      selector: "//cda:ficheTumeur/cda:codeLesionnel/text()"
    null_if_empty: true

  "/content[0]/items[0]/data/items[1]/value/value":
    get:
      selector: "//cda:ficheTumeur/cda:categorie/text()"
    transform: [strip]
    null_if_empty: true

  "/content[0]/items[0]/data/items[2]/value/value":
    get:
      selector: "//cda:ficheTumeur/cda:codeGdeLocalisation/text()"
    null_if_empty: true

  "/content[0]/items[0]/data/items[3]/items[0]/value/value":
    get:
      selector: "//cda:ficheTumeur/cda:codeSiege/text()"
    null_if_empty: true

  "/content[0]/items[0]/data/items[3]/items[1]/value/value":
    set: "Not specified"

  "/content[0]/items[0]/data/items[3]/items[2]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:cote/text())"
    map:
      "droit": "Right"
      "gauche": "Left"
    null_if_empty: true

  "/content[0]/items[0]/data/items[3]/items[2]/value/defining_code/code_string":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:cote/text())"
    map:
      "droit": "at0004"
      "gauche": "at0003"
    null_if_empty: true

  "/content[0]/items[0]/data/items[3]/items[2]/value/defining_code/terminology_id/value":
    set: "local"

  "/content[0]/items[0]/data/items[5]/value/value":
    get:
      selector: "concat(//cda:ficheTumeur/cda:dateDiagnostic/text(),'T00:00:00')"
    null_if_empty: true

  "/content[0]/items[0]/data/items[6]/value/value":
    get:
      selector: "concat(//cda:ficheTumeur/cda:dateDiagnostic/text(),'T00:00:00')"
    null_if_empty: true

  "/content[0]/items[0]/data/items[7]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:severity/text())"
    map:
      "at0047": "Mild"
      "at0048": "Moderate"
      "at0049": "Unknown"
    null_if_empty: true

  "/content[0]/items[0]/data/items[7]/value/defining_code/code_string":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:severity/text())"
    null_if_empty: true

  "/content[0]/items[0]/data/items[7]/value/defining_code/terminology_id/value":
    set: "local"

  "/content[0]/items[0]/data/items[8]/items[0]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:TNMs/cda:TNM[cda:type='c']/cda:T/text())"
    null_if_empty: true

  "/content[0]/items[0]/data/items[8]/items[1]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:TNMs/cda:TNM[cda:type='c']/cda:N/text())"
    null_if_empty: true

  "/content[0]/items[0]/data/items[8]/items[2]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:TNMs/cda:TNM[cda:type='c']/cda:M/text())"
    null_if_empty: true

  "/content[0]/items[0]/data/items[9]/items[0]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:TNMs/cda:TNM[cda:type='p']/cda:T/text())"
    null_if_empty: true

  "/content[0]/items[0]/data/items[9]/items[1]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:TNMs/cda:TNM[cda:type='p']/cda:N/text())"
    null_if_empty: true

  "/content[0]/items[0]/data/items[9]/items[2]/value/value":
    get:
      selector: "normalize-space(//cda:ficheTumeur/cda:TNMs/cda:TNM[cda:type='p']/cda:M/text())"
    null_if_empty: true

  "/content[0]/items[0]/protocol/items[0]/value/value":
    get:
      selector: "concat(//cda:ficheTumeur/cda:dateCreation/text(),'T00:00:00')"
