env:
  NODE_ENV: prod
  USE_DYNAMIC_CONFIG: "False"
  CORE_DATABASE_NAME: "hdl_core"
  KEHRNEL_JOBS_COLLECTION: "synthetic_data_jobs"
  KEHRNEL_AUTH_ENABLED: "true"
  KEHRNEL_TRUST_PROXY_IDENTITY: "false"
  KEHRNEL_SYNTHETIC_ENFORCE_TEAM_SCOPE: "false"
  KEHRNEL_API_HOST: "0.0.0.0"
  KEHRNEL_API_PORT: "8080"
  KEHRNEL_API_RELOAD: "false"
  
# Kanopy security and ownership (requires web-app chart v4.30.0+)
security:
  dataClassification: "Internal"
  dataDesignation: ["MI"]

ownership:
  driEmail: gio.rodriguez@mongodb.com

envSecrets:
  CORE_MONGODB_URL: kerhnel-backend-secrets
  ENV_SECRETS_KEY: kerhnel-backend-secrets
  KEHRNEL_API_KEYS: kerhnel-backend-secrets
  KEHRNEL_API_KEY_ENV_SCOPES: kerhnel-backend-secrets
  KEHRNEL_CORS_ORIGINS: kerhnel-backend-secrets


serviceAccount:
  enabled: true
  irsa:
    accountId: "275662791714"
    roleName: "kanopy-prod-cicd-irsa"
