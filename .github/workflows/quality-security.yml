name: Quality and Security

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  quality-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[all,dev]

      - name: Ruff lint
        run: ruff check --select F821 src tests

      - name: Bandit security scan
        run: bandit -c pyproject.toml -lll -r src/kehrnel

      - name: Dependency vulnerability scan
        run: pip-audit

      - name: Run tests
        run: pytest -q
